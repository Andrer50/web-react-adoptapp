services:
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    environment:
      NODE_ENV: production
      BACKEND_URL: ${BACKEND_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_OPTIONS: --max-old-space-size=192
    ports:
      - '3000:3000'

    volumes:
      - ./logs:/app/logs

    networks:
      - ms-net

    restart: 'no'

networks:
  ms-net:
    external: true
